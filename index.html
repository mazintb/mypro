<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f172a" />
    <title>منصة إدارة الأصول الشخصية</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f1f5f9; }
      /* Dynamic viewport — accounts for mobile browser chrome (address bar, gesture bar) */
      :root {
        --app-height: 100dvh;
        --nav-height: 80px;
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --content-bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
      }
      /* Fallback for browsers without dvh support */
      @supports not (height: 100dvh) {
        :root { --app-height: 100vh; }
      }
      /* Base element styles */
      select,input,textarea{background:#f8fafc;border:1px solid #e2e8f0;border-radius:0.75rem;padding:0.5rem 0.75rem;font-size:0.875rem;width:100%;outline:none;font-family:inherit;color:#334155}
      select:focus,input:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,0.2)}
      button{cursor:pointer;border:none;background:none;font-family:inherit}
      table{border-collapse:collapse;width:100%}
      th,td{text-align:inherit}
      @media print { aside, header, footer, button { display: none !important; } main { padding: 0 !important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
